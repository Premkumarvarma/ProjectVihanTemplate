<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Prem Coffee Shop</title>

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="overlay">

        <!-- Header -->

        <header>

            <h1>

                <i class="fas fa-mug-hot"></i>

                Prem Coffee Shop

            </h1>

            <p>

                Great Coffee, Great Day!

            </p>

        </header>

        <!-- Add Coffee Section -->

        <section class="add-coffee">

            <h2>

                <i class="fas fa-coffee"></i>

                Add Coffee

            </h2>

            <div class="form-row">

                <input
                    type="text"
                    id="coffeeName"
                    placeholder="Coffee Name">

                <input
                    type="number"
                    id="price"
                    placeholder="Price">

                <input
                    type="text"
                    id="category"
                    placeholder="Category">

                <select id="available">

                    <option value="true">
                        Available
                    </option>

                    <option value="false">
                        Not Available
                    </option>

                </select>

                <button
                    id="saveButton"
                    onclick="saveOrUpdateCoffee()">

                    <i class="fas fa-mug-hot"></i>

                    Save Coffee

                </button>

            </div>

            <button
                class="cart-btn"
                onclick="findAllCoffee()">

                <i class="fas fa-cart-shopping"></i>

                View Coffees

            </button>

        </section>

        <!-- Coffee Menu -->

        <section class="menu-section">

            <h2>

                <i class="fas fa-mug-hot"></i>

                Coffee Menu

            </h2>

            <div
                id="coffeeContainer"
                class="coffee-container">

            </div>

        </section>

    </div>

    <!-- JavaScript Files -->

   <script src="js/common.js"></script>
<script src="js/coffee.js"></script>
<script src="js/cart.js"></script>
<script src="js/order.js"></script>
<script src="js/app.js"></script>

</body>

</html>
